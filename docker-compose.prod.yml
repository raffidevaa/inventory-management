services:
  app:
    image: ${APP_IMAGE:-asia-southeast1-docker.pkg.dev/pso-7-494801/inventory-management-app/app:latest}
    restart: unless-stopped
    ports:
      - "80:80"
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-inventory_management}
      POSTGRES_USER: ${DB_USERNAME:-inventory_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-inventory_user}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
