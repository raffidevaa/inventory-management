services:
    app:
        build: .
        ports:
            - "8000:80"
        env_file: .env
        environment:
            DB_HOST: postgres
            DB_PORT: 5432
            # Override .env for the local smoke test — avoids needing the GCS key inside the container.
            # Production (VM) keeps FILESYSTEM_DISK=gcs via ADC.
            FILESYSTEM_DISK: local
        # To test GCS locally, mount the key and set GCS_KEY_FILE_PATH accordingly in .env:
        #   GCS_KEY_FILE_PATH=/var/www/html/storage/gcs-key.json
        # volumes:
        #   - ~
        depends_on:
            postgres:
                condition: service_healthy

    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_DB: ${DB_DATABASE:-inventory_management}
            POSTGRES_USER: ${DB_USERNAME:-postgres}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
        ports:
            - "5544:5432" # host port for DB clients only; app connects internally on 5432
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
            interval: 5s
            timeout: 3s
            retries: 10

volumes:
    pgdata:
