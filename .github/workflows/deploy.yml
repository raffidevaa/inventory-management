name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGION: asia-southeast1
  REPO: inventory-management-app
  IMAGE: app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Compute image reference
        id: meta
        run: |
          IMG="${REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${REPO}/${IMAGE}"
          TAG="${GITHUB_SHA::8}"
          echo "image=${IMG}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "latest=${IMG}:latest" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: |
          docker build --platform linux/amd64 \
            -t "${{ steps.meta.outputs.image }}" \
            -t "${{ steps.meta.outputs.latest }}" \
            .

      - name: Push image
        run: |
          docker push "${{ steps.meta.outputs.image }}"
          docker push "${{ steps.meta.outputs.latest }}"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose file to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_SSH_HOST }}
          username: ${{ secrets.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /home/ubuntu/inventory-app/

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_IMAGE: ${{ needs.build-and-push.outputs.image }}
        with:
          host: ${{ secrets.VM_SSH_HOST }}
          username: ${{ secrets.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: APP_IMAGE
          script: |
            cd /home/ubuntu/inventory-app
            export APP_IMAGE="$APP_IMAGE"
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
